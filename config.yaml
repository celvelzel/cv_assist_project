# CV 视觉辅助系统 - Profile 预设配置
# ===================================
# 注意: 所有配置的默认值已在 config.py 中定义。
# 本文件仅用于定义不同运行模式（profile）的覆盖值。
# 使用方式: python main.py --config <profile_name>
# 可用 profile: fast, no-voice
# balanced 模式使用 config.py 中的全部默认值，无需在此定义。

# ---- Profile 预设（仅列出与 config.py 默认值不同的字段） ----
profiles:
  fast: # 性能优先，适合低配设备
    model:
      owlvit_input_size: [320, 320]
    optimization:
      skip_frames_detection: 3
      skip_frames_depth: 3

  no-voice: # 仅视觉处理，无语音交互
    audio:
      enable_asr: false
      enable_tts: false

  light: # 极速模式：大幅降低检测频率，适合 CPU 运行
    model:
      owlvit_input_size: [256, 256]
      midas_model: MiDaS_small
    optimization:
      skip_frames_detection: 5
      skip_frames_depth: 5

# balanced 无额外 override，直接使用 config.py 中的全部默认值。
